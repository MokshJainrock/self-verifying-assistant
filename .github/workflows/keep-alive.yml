name: Keep Streamlit app awake

on:
  schedule:
    # Every 6 hours — well inside Streamlit's 12-hour sleep window.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          pip install playwright==1.51.0
          playwright install chromium --with-deps

      - name: Wake Streamlit app
        env:
          STREAMLIT_APP_URL: https://self-verifying-assistant.streamlit.app
        run: python scripts/keep_alive.py
